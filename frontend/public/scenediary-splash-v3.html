const iframe = document.querySelector('#source_splash');
const sendPhotos = () => iframe.contentWindow?.postMessage({
  type: 'scenediary-splash-photos',
  photos: SPLASH_PHOTOS,
}, '*');

window.addEventListener('message', (event) => {
  if (event.source === iframe.contentWindow && event.data?.type === 'scenediary-splash-ready') {
    sendPhotos();
  }
});
iframe.addEventListener('load', sendPhotos);
iframe.src = SOURCE_HTML;
